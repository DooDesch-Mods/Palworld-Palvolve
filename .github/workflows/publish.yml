name: Publish release

# Nexus Mods publishing runs automatically whenever a GitHub release is
# published - creating the release is the explicit go. Until the Nexus ids are
# configured in publishing/publish-config.json the Nexus steps skip with a
# notice, so releases never fail on an unconfigured platform.
# Thunderstore stays manual-only and dormant (see publishing/README.md).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version of an existing GitHub release (without the v prefix), e.g. 1.1.0"
        required: true
      publish_thunderstore:
        description: "Publish to Thunderstore (needs TCLI_AUTH_TOKEN secret)"
        type: boolean
        default: false
      publish_nexus:
        description: "Upload to Nexus Mods (needs NEXUSMODS_API_KEY secret and nexus ids in publishing/publish-config.json)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${RELEASE_TAG#v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::could not resolve a version from the release tag or the workflow input"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download the release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "v${{ steps.ver.outputs.version }}" --pattern "Palvolve-v${{ steps.ver.outputs.version }}.zip" --dir dist --repo "${{ github.repository }}"

      - name: Build Thunderstore package
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: bash publishing/build-thunderstore.sh "${{ steps.ver.outputs.version }}"

      - name: Keep packages as workflow artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: packages-v${{ steps.ver.outputs.version }}
          path: |
            dist/Palvolve-v${{ steps.ver.outputs.version }}.zip
            dist/thunderstore/*.zip
            dist/thunderstore/thunderstore.toml

      - name: Publish to Thunderstore
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_thunderstore }}
        env:
          TCLI_AUTH_TOKEN: ${{ secrets.TCLI_AUTH_TOKEN }}
        run: |
          dotnet tool install --global tcli
          tcli publish \
            --config-path dist/thunderstore/thunderstore.toml \
            --file "dist/thunderstore/DooDesch-Mods-Palvolve-${{ steps.ver.outputs.version }}.zip"

      # Nexus wiring follows the ScheduleOne pipeline convention: the file
      # group id lives in the repo/org variable NEXUS_FILE_GROUP_ID (read it
      # from "API Info" on the mod page's Files tab), the API key in the org
      # secret NEXUSMODS_API_KEY.
      - name: Read Nexus config
        id: nexus
        if: ${{ github.event_name == 'release' || inputs.publish_nexus }}
        env:
          NEXUS_KEY: ${{ secrets.NEXUSMODS_API_KEY }}
          FILE_ID: ${{ vars.NEXUS_FILE_GROUP_ID }}
        run: |
          MISSING=""
          [ -z "$FILE_ID" ] && MISSING="the NEXUS_FILE_GROUP_ID repo variable"
          [ -z "$NEXUS_KEY" ] && MISSING="${MISSING:+$MISSING and }the NEXUSMODS_API_KEY secret"
          if [ -n "$MISSING" ]; then
            if [ "${{ github.event_name }}" = "release" ]; then
              echo "::notice::Nexus upload skipped - still missing: $MISSING"
              echo "configured=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Nexus upload requested but missing: $MISSING - create the mod page and first file manually, then store its ids"
            exit 1
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
          echo "file_id=$FILE_ID" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version as BBCode
        id: changelog
        if: ${{ steps.nexus.outputs.configured == 'true' }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SECTION=$(awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { flag = 1; next }
            /^## / { flag = 0 }
            flag' CHANGELOG.md)
          if [ -z "$SECTION" ]; then
            echo "::warning::no CHANGELOG.md section found for $VERSION - uploading with a link only"
          fi
          # Nexus file descriptions use BBCode, not Markdown. Convert "### Heading"
          # to [b]Heading[/b], "- item" bullets to [list]/[*], drop inline-code
          # backticks, and join wrapped bullet lines.
          BBCODE=$(printf '%s\n' "$SECTION" | awk '
            function flush(){ if(buf!=""){ printf "[*]%s\n", buf; buf="" } }
            BEGIN{ inlist=0; buf="" }
            {
              line=$0; gsub(/`/,"",line); sub(/[ \t]+$/,"",line)
              if (line ~ /^### /){ flush(); if(inlist){print "[/list]"; inlist=0} h=line; sub(/^### /,"",h); printf "[b]%s[/b]\n", h; next }
              if (line ~ /^- /){ flush(); if(!inlist){print "[list]"; inlist=1} buf=line; sub(/^- /,"",buf); next }
              if (line ~ /^[ \t]*$/){ next }
              sub(/^[ \t]+/,"",line); if(buf!="") buf=buf " " line; else printf "%s\n", line
            }
            END{ flush(); if(inlist) print "[/list]" }')
          {
            echo "notes<<CHANGELOG_EOF"
            [ -n "$BBCODE" ] && echo "$BBCODE"
            echo "Full changelog: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to Nexus Mods
        if: ${{ steps.nexus.outputs.configured == 'true' }}
        uses: Nexus-Mods/upload-action@v1.0.0-beta.9
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: ${{ steps.nexus.outputs.file_id }}
          filename: dist/Palvolve-v${{ steps.ver.outputs.version }}.zip
          version: ${{ steps.ver.outputs.version }}
          display_name: Palvolve ${{ steps.ver.outputs.version }}
          description: ${{ steps.changelog.outputs.notes }}
          category: main
          primary_mod_manager_download: true
          allow_mod_manager_download: true
          archive_existing_version: true
          update_mod_version: true
